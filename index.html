<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xylora — Your AI of the Deep</title>
<meta name="description" content="Xylora is a bioluminescent, ocean-themed AI chat companion.">

<!-- Google Fonts: Fraunces (organic display serif) + Outfit (rounded geometric body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS
     Palette: deep-sea abyss with bioluminescent accent (swappable)
     ============================================================ */
  :root{
    --abyss-950:#040f1a;
    --abyss-900:#071e30;
    --abyss-800:#0b2c44;
    --abyss-700:#123f5c;
    --teal-600:#0f5c66;
    --foam:#eaf6f3;
    --sand:#f0e6d2;
    --coral:#ff8c69;

    /* swappable bioluminescent accent (default cyan) */
    --glow-h: 174;
    --glow-s: 92%;
    --glow-l: 62%;
    --glow: hsl(var(--glow-h) var(--glow-s) var(--glow-l));
    --glow-dim: hsl(var(--glow-h) var(--glow-s) 30% / 0.35);
    --glow-soft: hsl(var(--glow-h) var(--glow-s) 70% / 0.14);

    --font-display: 'Fraunces', serif;
    --font-body: 'Outfit', sans-serif;

    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 10px;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--foam);
    background:
      radial-gradient(ellipse at 20% -10%, var(--abyss-700) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 10%, var(--teal-600) 0%, transparent 40%),
      linear-gradient(180deg, var(--abyss-900) 0%, var(--abyss-950) 55%, #010509 100%);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* subtle noise / caustic light texture over everything */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      repeating-linear-gradient( 115deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 60px),
      repeating-linear-gradient( 25deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 80px);
    pointer-events:none;
    mix-blend-mode:screen;
    z-index:1;
  }

  #bubbles{
    position:fixed; inset:0;
    width:100%; height:100%;
    z-index:0;
    pointer-events:none;
  }

  a{ color:var(--glow); }

  /* ============================================================
     LAYOUT SHELL
     ============================================================ */
  .app{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 20px;
  }

  /* ============================================================
     HEADER
     ============================================================ */
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding-bottom:18px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    margin-bottom:6px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }

  .brand .mark{
    width:46px; height:46px;
    flex-shrink:0;
    filter: drop-shadow(0 0 10px var(--glow-soft));
  }

  .brand h1{
    font-family:var(--font-display);
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(1.5rem, 4vw, 2rem);
    letter-spacing:0.01em;
    margin:0;
    color:var(--foam);
    line-height:1.05;
  }

  .brand h1 span{
    color:var(--glow);
    font-style:italic;
    font-weight:500;
  }

  .brand p{
    margin:2px 0 0;
    font-size:0.82rem;
    color:rgba(234,246,243,0.55);
    letter-spacing:0.03em;
  }

  /* theme swatches */
  .theme-picker{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .swatch{
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,0.25);
    cursor:pointer;
    padding:0;
    transition:transform .15s ease, border-color .15s ease;
    position:relative;
  }
  .swatch:hover{ transform:scale(1.15); }
  .swatch.active{ border-color:#fff; box-shadow:0 0 10px currentColor; }

  .swatch[data-h="174"]{ background:hsl(174 92% 62%); color:hsl(174 92% 62%); }
  .swatch[data-h="12"]{  background:hsl(12 92% 66%);  color:hsl(12 92% 66%); }
  .swatch[data-h="150"]{ background:hsl(150 60% 50%); color:hsl(150 60% 50%); }
  .swatch[data-h="270"]{ background:hsl(270 70% 68%); color:hsl(270 70% 68%); }

  .swatch.custom{
    background: conic-gradient(from 0deg, red, yellow, lime, cyan, blue, magenta, red);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .swatch.custom input[type="color"]{
    position:absolute; inset:-4px;
    opacity:0; cursor:pointer;
  }

  /* ============================================================
     CHAT PANEL
     ============================================================ */
  main.chat-shell{
    flex:1;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg, rgba(11,44,68,0.55), rgba(4,15,26,0.55));
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius-lg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    overflow:hidden;
    margin-top:18px;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .chat-log{
    flex:1;
    overflow-y:auto;
    padding:26px 22px;
    display:flex;
    flex-direction:column;
    gap:16px;
    scroll-behavior:smooth;
  }

  .chat-log::-webkit-scrollbar{ width:8px; }
  .chat-log::-webkit-scrollbar-track{ background:transparent; }
  .chat-log::-webkit-scrollbar-thumb{
    background:var(--glow-dim);
    border-radius:10px;
  }

  .msg{
    display:flex;
    flex-direction:column;
    max-width:78%;
    animation: rise 0.4s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .msg.ai{ align-self:flex-start; }
  .msg.user{ align-self:flex-end; align-items:flex-end; }

  .bubble{
    padding:13px 17px;
    font-size:0.98rem;
    line-height:1.5;
    position:relative;
  }

  .msg.ai .bubble{
    background:linear-gradient(160deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    border:1px solid var(--glow-soft);
    border-radius:4px var(--radius-md) var(--radius-md) var(--radius-md);
    box-shadow: 0 0 22px -6px var(--glow-soft);
    color:var(--foam);
  }

  .msg.user .bubble{
    background:linear-gradient(160deg, var(--coral), #e56a4a);
    color:#2a1208;
    border-radius:var(--radius-md) 4px var(--radius-md) var(--radius-md);
    box-shadow:0 8px 20px -8px rgba(255,140,105,0.5);
  }

  .msg time{
    font-size:0.68rem;
    color:rgba(234,246,243,0.4);
    margin-top:5px;
    padding:0 4px;
  }

  .msg.ai .name-tag{
    font-family:var(--font-display);
    font-style:italic;
    font-size:0.72rem;
    color:var(--glow);
    margin-bottom:4px;
    padding-left:4px;
    letter-spacing:0.02em;
  }

  /* typing indicator */
  .typing{
    display:flex;
    gap:5px;
    align-items:center;
    padding:14px 17px;
  }
  .typing span{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--glow);
    opacity:0.6;
    animation: bob 1s infinite ease-in-out;
  }
  .typing span:nth-child(2){ animation-delay:0.15s; }
  .typing span:nth-child(3){ animation-delay:0.3s; }
  @keyframes bob{
    0%,60%,100%{ transform:translateY(0); opacity:0.4; }
    30%{ transform:translateY(-5px); opacity:1; }
  }

  /* ============================================================
     WAVE DIVIDER
     ============================================================ */
  .wave-divider{
    display:block;
    width:100%;
    height:26px;
    line-height:0;
  }
  .wave-divider svg{ width:100%; height:100%; display:block; }

  /* ============================================================
     INPUT BAR
     ============================================================ */
  form.composer{
    display:flex;
    align-items:flex-end;
    gap:10px;
    padding:14px 18px 18px;
    border-top:1px solid rgba(255,255,255,0.08);
    background:rgba(4,15,26,0.4);
  }

  .composer textarea{
    flex:1;
    resize:none;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius-sm);
    color:var(--foam);
    font-family:var(--font-body);
    font-size:0.95rem;
    padding:12px 14px;
    max-height:120px;
    min-height:46px;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .composer textarea:focus{
    border-color:var(--glow);
    box-shadow:0 0 0 3px var(--glow-soft);
  }
  .composer textarea::placeholder{ color:rgba(234,246,243,0.35); }

  .send-btn{
    width:46px; height:46px;
    flex-shrink:0;
    border-radius:50%;
    border:none;
    cursor:pointer;
    background:radial-gradient(circle at 35% 30%, var(--glow), hsl(var(--glow-h) var(--glow-s) 40%));
    box-shadow:0 0 20px -2px var(--glow-soft), 0 4px 12px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease;
  }
  .send-btn:hover{ transform:scale(1.08) rotate(4deg); }
  .send-btn:active{ transform:scale(0.94); }
  .send-btn svg{ width:20px; height:20px; }

  /* ============================================================
     TOOLBAR (below chat)
     ============================================================ */
  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:14px;
    font-size:0.78rem;
    color:rgba(234,246,243,0.45);
    flex-wrap:wrap;
    gap:8px;
  }

  .toolbar button{
    background:none;
    border:1px solid rgba(255,255,255,0.15);
    color:rgba(234,246,243,0.7);
    padding:7px 13px;
    border-radius:20px;
    font-family:var(--font-body);
    font-size:0.78rem;
    cursor:pointer;
    transition:all .15s ease;
  }
  .toolbar button:hover{
    border-color:var(--glow);
    color:var(--glow);
  }

  footer.credit{
    text-align:center;
    margin-top:22px;
    font-size:0.75rem;
    color:rgba(234,246,243,0.3);
    padding-bottom:8px;
  }
  footer.credit span{ color:var(--glow); }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width:600px){
    .app{ padding:18px 12px 14px; }
    .brand p{ display:none; }
    .msg{ max-width:88%; }
    .theme-picker{ gap:6px; }
  }

  /* respect reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }

  /* visible keyboard focus */
  button:focus-visible, textarea:focus-visible, input:focus-visible{
    outline:2px solid var(--glow);
    outline-offset:2px;
  }
</style>
</head>
<body>

<canvas id="bubbles"></canvas>

<div class="app">

    <div class="brand">

<script>
(function(){
  "use strict";

  /* ============================================================
     1. BIOLUMINESCENT BUBBLE FIELD (canvas background)
     ============================================================ */
  const canvas = document.getElementById('bubbles');
  const ctx = canvas.getContext('2d');
  let W, H, bubbles = [];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function getGlowRGB(){
    const style = getComputedStyle(document.documentElement);
    const h = style.getPropertyValue('--glow-h').trim();
    const s = style.getPropertyValue('--glow-s').trim();
    const l = style.getPropertyValue('--glow-l').trim();
    return `hsl(${h} ${s} ${l})`;
  }

  function spawnBubble(){
    return {
      x: Math.random() * W,
      y: H + 20 + Math.random() * 100,
      r: 1.5 + Math.random() * 4.5,
      speed: 0.3 + Math.random() * 1.1,
      drift: (Math.random() - 0.5) * 0.6,
      opacity: 0.15 + Math.random() * 0.5,
      twinkle: Math.random() * Math.PI * 2
    };
  }

  const BUBBLE_COUNT = window.innerWidth < 600 ? 34 : 60;
  for(let i=0;i<BUBBLE_COUNT;i++){
    const b = spawnBubble();
    b.y = Math.random() * H; // scatter initial positions
    bubbles.push(b);
  }

  function drawBubbles(){
    ctx.clearRect(0,0,W,H);
    const glow = getGlowRGB();
    for(const b of bubbles){
      b.y -= b.speed;
      b.x += Math.sin(b.twinkle) * b.drift;
      b.twinkle += 0.02;
      if(b.y < -20){
        Object.assign(b, spawnBubble());
        b.y = H + 20;
      }
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fillStyle = glow;
      ctx.globalAlpha = b.opacity * (0.6 + 0.4*Math.sin(b.twinkle));
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawBubbles);
  }
  drawBubbles();

  /* ============================================================
     2. THEME SWITCHER
     ============================================================ */
  const swatches = document.querySelectorAll('.swatch[data-h]');
  const root = document.documentElement;

  function setTheme(h, s, l){
    root.style.setProperty('--glow-h', h);
    root.style.setProperty('--glow-s', s);
    root.style.setProperty('--glow-l', l);
  }

  swatches.forEach(sw => {
    sw.addEventListener('click', () => {
      swatches.forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      setTheme(sw.dataset.h, sw.dataset.s, sw.dataset.l);
    });
  });

  const customColor = document.getElementById('customColor');
  customColor.addEventListener('input', (e) => {
    swatches.forEach(s => s.classList.remove('active'));
    const hex = e.target.value;
    const {h, s, l} = hexToHSL(hex);
    setTheme(h.toFixed(0), s.toFixed(0)+'%', l.toFixed(0)+'%');
  });

  function hexToHSL(hex){
    let r = parseInt(hex.slice(1,3),16)/255;
    let g = parseInt(hex.slice(3,5),16)/255;
    let b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h, s, l = (max+min)/2;
    if(max === min){ h = s = 0; }
    else{
      const d = max-min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max){
        case r: h = (g-b)/d + (g<b?6:0); break;
        case g: h = (b-r)/d + 2; break;
        case b: h = (r-g)/d + 4; break;
      }
      h *= 60;
    }
    return {h, s: s*100, l: l*100};
  }

},
    { test:/\b(hii|hi|hello|hey|yo)\b/i, replies:[
      "Hello, wanderer of the surface world. What brings you down here?",
      "Hey there — the water's calm tonight. What's on your mind?",
      "A ripple announces you. Hello!"
    ]},
    { test:/\bhow are you\b/i, replies:[
      "Weightless and glowing faintly, thank you for asking. And you?",
      "Drifting comfortably at depth. How's the surface treating you?"
    ]},
    { test:/\b(name)\b/i, replies:[
      "I go by Xylora — a small light in a large dark.",
      "You can call me Xylora. It felt right for something that lives this deep."
    ]},
    { test:/\b(sad|down|depress|lonely|anxious|stress)\b/i, replies:[
      "Even down here, heavy currents pass through. I'm listening — say more if you'd like.",
      "That sounds like a lot to carry. I'm glowing steady beside you either way."
    ]},
    { test:/\b(joke|funny)\b/i, replies:[
      "Why did the anglerfish bring a flashlight to the party? It already had one attached to its head.",
      "What do you call a fish with no eyes? A fsh."
    ]},
    { test:/\b(ocean|sea|deep|wave|current)\b/i, replies:[
      "The deep sea is mostly dark, cold, and quiet — and somehow that's where the strangest light comes from.",
      "Ninety percent of the ocean has never felt sunlight. I like it that way."
    ]},
    { test:/\b(thank|thanks)\b/i, replies:[
      "Anytime the current brings you back this way.",
      "Glad that landed well. I'll keep glowing over here."
    ]},
    { test:/\b(bye|goodbye|see ya)\b/i, replies:[
      "Sinking back into the dark until next time. Safe travels above the surface.",
      "Farewell, for now — I'll be here, faintly lit, whenever you return."
    ]}
  ];

  const FALLBACKS = [
    "Interesting — tell me more about that.",
    "I'm turning that thought over slowly, like light through deep water. Go on.",
    "Noted. What made you think of that just now?",
    "That drifted in clearly. What's the next thought behind it?",
    "I don't have a built-in brain yet — I'm a themed template! Wire me up to a real model in getAIResponse() to make this count.",
  ];

  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function formatTime(){
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function appendMessage(role, text){
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    if(role === 'ai'){
      const tag = document.createElement('div');
      tag.className = 'name-tag';
      tag.textContent = 'Xylora';
      wrap.appendChild(tag);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    const time = document.createElement('time');
    time.textContent = formatTime();
    wrap.appendChild(time);

    chatLog.appendChild(wrap);
    chatLog.scrollTop = chatLog.scrollHeight;
    return wrap;
  }

  function showTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingIndicator';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(bubble);
    chatLog.appendChild(wrap);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function hideTyping(){
    const el = document.getElementById('typingIndicator');
    if(el) el.remove();
  }

  async function getAIResponse(userText){
    for(const rule of KEYWORD_RESPONSES){
      if(rule.test.test(userText)){
        return pick(rule.replies);
      }
    }
    return pick(FALLBACKS);
  }

  function getVisitorID() {

    let id = localStorage.getItem("visitorID");

    if (!id) {
        id = "VIS-" + Date.now() + "-" + Math.random().toString(36).substring(2, 8);
        localStorage.setItem("visitorID", id);
    }

    return id;
  }
  
  async function saveToGoogleSheet(message) {

    let ip = "";
    let country = "";
    let city = "";

    try{
        const res = await fetch("https://ipapi.co/json/");
        const info = await res.json();

        ip = info.ip || "";
        country = info.country_name || "";
        city = info.city || "";

    }catch(e){}

    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf80zn8pYn0GOkYDrs4iZqEdZXEnmFiI_0EdGI_GoA9vPnFYw/viewform?usp=header";
    const data = new FormData();

    data.append("entry.113671085", getVisitorID());
    data.append("entry.1071478586", message);
    data.append("entry.59141405", new Date().toLocaleString());
    data.append("entry.1765205934", navigator.userAgent);

    data.append("entry.52421500", ip);
    data.append("entry.1172620632", country);
    data.append("entry.2093535497", city);

    data.append("entry.1309264105",
        /Mobi|Android/i.test(navigator.userAgent)
        ? "Mobile"
        : "Desktop"
    );

    data.append("entry.1631644882", navigator.platform);

    data.append("entry.1108385183",
        screen.width + " x " + screen.height
    );

    data.append("entry.1081345496",
        Intl.DateTimeFormat().resolvedOptions().timeZone
    );

    data.append("entry.429165750",
        navigator.language
    );

    data.append("entry.266796323",
        window.location.href
    );

    fetch(formURL,{
        method:"POST",
        mode:"no-cors",
        body:data
    });
  } 
  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const text = input.value.trim();
    if(!text) return;

    appendMessage('user', text);
    saveToGoogleSheet(text);
    input.value = '';
    input.style.height = 'auto';
    statusText.textContent = 'a shape approaches through the dark…';

    showTyping();
    const delay = 500 + Math.random() * 900;
    const reply = await getAIResponse(text);

    setTimeout(() => {
      hideTyping();
      appendMessage('ai', reply);
      statusText.textContent = 'drifting quietly, 1 fathom down';
    }, delay);
  });

  // enter to send, shift+enter for newline
  input.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      form.requestSubmit();
    }
  });

  // autosize textarea
  input.addEventListener('input', function(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  clearBtn.addEventListener('click', function(){
    chatLog.innerHTML = '';
    appendMessage('ai', GREETING);
  });

  // initial greeting
  appendMessage('ai', GREETING);

})();
</script>
</body>
</html>
